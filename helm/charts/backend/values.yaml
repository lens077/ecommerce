enabled: true
replicaCount: 1
image:
  repository: "harbor.apikv.com:5443/sumery/connect-example-backend"
  tag: "1.4.1"
  pullPolicy: IfNotPresent
service:
  type: LoadBalancer
  port: 4000
  targetPort: 4000
environment:
  HTTP_ADDR: "0.0.0.0:4000"
  RUN_MODE: "prod"
  OTLP_HTTP_ENDPOINT: "center-collector.observability:4318"
  # 禁用Consul服务发现，避免依赖注入错误
  DISABLE_CONSUL: "true"
autoscaling:
  enabled: false
