syntax = "proto3";

package gateway.middleware.tracing.v1;
option go_package = "github.com/go-kratos/gateway/api/gateway/middleware/tracing/v1;v1";

import "google/protobuf/duration.proto";

// Tracing middleware config.
message Tracing {
	// report endpoint url
	string http_endpoint = 1;
	// sample ratio
	optional float sample_ratio = 2;
	// report timeout
	google.protobuf.Duration timeout = 4;
	// ssl
	optional bool insecure = 5;

	TLS tls = 6;
	message TLS {
		bool enable = 1;
		string ca_pem = 2;
		bool insecure_skip_verify = 3;
	}
}
