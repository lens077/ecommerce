services:

  ecommerce-gateway:
    image: ccr.ccs.tencentyun.com/sumery/ecommerce-gateway:latest
    ports:
      - "8080:8080"
    networks:
      - ecommerce
    container_name: ecommerce-gateway
#    platform: linux/arm64
    pull_policy: always
    restart: on-failure:3
    environment:
      - OWNER=ecommerce
      - CASDOOR_URL=https://apikv.com:8081
      - CONSUL_ADDR=consul://apikv.com:8500
      - DISCOVERY_CONFIG_PATH=ecommerce/gateway/config.yaml
      - POLICIES_FILE_PATH=./configs/policies/policies.csv
      - MODEL_FILE_PATH=./configs/policies/model.conf
      - USE_TLS=false
      - USE_HTTP3=false
      - HTTP_PORT=8080
    command:
      - "/app/gateway"
      - "-conf"
      - "/app/configs/config.yaml"

networks:
  ecommerce:
    external: true

