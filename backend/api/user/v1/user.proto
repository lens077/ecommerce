syntax = "proto3";

import "api/casdoor/v1/user.proto";

package user.v1;

option go_package = "github.com/lens077/ecommerce/backend/api/user/v1;userv1";

service UserService {
  rpc SignIn(SignInRequest) returns(SignInResponse){}
  rpc UserProfile(UserProfileRequest) returns(UserProfileResponse){}
}

message SignInRequest {
  string code = 1;
  string state = 2;
}

message SignInResponse {
  string state = 1;
  string data = 2;
}

message UserProfileRequest{

}

message UserProfileResponse {
  casdoor.v1.User user = 1;
}
