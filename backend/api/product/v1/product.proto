syntax = "proto3";

package product.v1;

option go_package = "github.com/lens077/ecommerce/backend/api/product/v1;productv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "third_party/validate/validate.proto";

service ProductService {
  rpc GetProductDetail(GetProductDetailRequest) returns(GetProductDetailResponse){}
}

message GetProductDetailRequest {
  string spu_code = 1;
}

message GetProductDetailResponse {
  ProductSpuDetail product_detail = 1;
}

message ProductSpuDetail {
  int64 spu_id = 1;
  string name = 2;
  string spu_code = 3;
  // 使用 google.protobuf.Struct 来匹配 map[string]any
  google.protobuf.Struct common_specs = 4;
  repeated ProductSku skus = 5;
}

message ProductSku {
  int64 sku_id = 1;
  string sku_code = 2;
  double price = 3;
  int32 stock = 4;
  // 使用 google.protobuf.Struct 处理动态 SKU 属性
  google.protobuf.Struct attrs = 5;
  string img = 6;
}

