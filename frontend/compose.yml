services:
  frontend:
#    image: harbor.apikv.com/sumery/connect-frontend-example:dev # 这里需要替换成你的镜像名
    container_name: connect-example-frontend
    build:
      context: .
      dockerfile: ./Dockerfile
      target: final
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    # 环境变量
    #environment:
    restart: on-failure:4 # 重启策略，最多重启n次
