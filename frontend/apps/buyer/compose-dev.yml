services:
  frontend:
    image: harbor.apikv.com:5443/ecommerce/frontend:dev
    container_name: ecommerce-frontend
    pull_policy: always
    build:
      context: .
      dockerfile: ./Dockerfile
      target: final
    ports:
      - "3000:80"
      - "443:443"
      - "443:443/udp"
    # 环境变量
    environment:
      - GATEWAY_URL=http://192.168.3.112:8080
    restart: on-failure:4 # 重启策略，最多重启n次
